name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads the pnpm version from package.json's "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

      # env.mjs validates NEXT_PUBLIC_APP_NAME at build time, so it must be set
      # here or the production build fails fast.
      - run: pnpm --filter web build
        env:
          NEXT_PUBLIC_APP_NAME: Todos
